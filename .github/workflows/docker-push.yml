# GitHub Action：推送镜像到 GHCR
name: Docker Push

on:
  push:
    branches:
      - main

jobs:
  docker-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Send Bark start notification
        env:
          BARK_WEBHOOK: ${{ secrets.BARK_WEBHOOK }}
        run: |
          if [ -z "${BARK_WEBHOOK}" ]; then
            echo "BARK_WEBHOOK 未配置，跳过开始通知"
            exit 0
          fi
          MESSAGE_TITLE="Docker镜像 编译开始"
          REPO_NAME=$(basename "${GITHUB_REPOSITORY}")
          COMMIT_ID=$(echo "${GITHUB_SHA}" | cut -c1-7)
          MESSAGE_BODY="仓库：${REPO_NAME} 分支：${GITHUB_REF_NAME} 提交：${COMMIT_ID}"
          ENCODED_TITLE=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "${MESSAGE_TITLE}")
          ENCODED_BODY=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "${MESSAGE_BODY}")
          curl -sS "${BARK_WEBHOOK}/${ENCODED_TITLE}/${ENCODED_BODY}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push image via script
        run: |
          chmod +x scripts/push-ghcr.sh
          ./scripts/push-ghcr.sh

  notify:
    needs: docker-push
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Bark notification
        run: |
          STATUS="${{ needs.docker-push.result }}"
          if [ "${STATUS}" = "success" ]; then
            MESSAGE_TITLE="Docker镜像 推送成功"
          else
            MESSAGE_TITLE="Docker镜像 推送失败"
          fi
          REPO_NAME=$(basename "${GITHUB_REPOSITORY}")
          COMMIT_ID=$(echo "${GITHUB_SHA}" | cut -c1-7)
          MESSAGE_BODY="仓库：${REPO_NAME} 分支：${GITHUB_REF_NAME} 提交：${COMMIT_ID}"
          ENCODED_TITLE=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "${MESSAGE_TITLE}")
          ENCODED_BODY=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "${MESSAGE_BODY}")
          curl -sS "${{ secrets.BARK_WEBHOOK }}/${ENCODED_TITLE}/${ENCODED_BODY}"
